name: LifeSteal
version: 1.0
main: com.stormai.plugin.Main
api-version: 1.21
commands:
  lifesteal:
    description: LifeSteal plugin commands
    usage: /lifesteal <withdraw>
    aliases: [ls]
permissions:
  lifesteal.withdraw:
    description: Allows player to withdraw health as items
    default: true